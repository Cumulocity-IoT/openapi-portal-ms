name: Create a release and archive Docker Image

on:
  push:
    branches:
      - release

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set Git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Bump version and create Git commit
        run: |
          VERSION=$(npm version patch -m "Bump version to %s")
          echo "TAG_NAME=$(echo $VERSION)" >> $GITHUB_ENV
          echo "VERSION=$(echo $VERSION | sed 's/^v//')" >> $GITHUB_ENV
          echo "New version: ${{ env.VERSION }}"
      
      - name: Update version in cumulocity.json
        run: |
          # Replace the version in cumulocity.json
          contents="$(jq --arg version "${{ env.VERSION }}" '.version = $version' cumulocity.json)" && echo -E "${contents}" > cumulocity.json
          cat cumulocity.json

      - name: Commit version change in cumulocity.json
        run: |
          git add cumulocity.json
          git commit -m "Update version in cumulocity.json to ${{ env.VERSION }}"
          git push origin release
      
      - name: Create a new tag for the release
        run: |
          git tag ${{ env.TAG_NAME }} --force  # Create a tag with the version name
          git push origin ${{ env.TAG_NAME }}  # Push the tag to the remote repository

  archive:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner
    needs: create-release
    steps:
      # Step 1: Check out the code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx for multi-platform support
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Cache Docker layers to speed up builds (optional)
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Step 4: Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t gainsight-sync-ms --platform linux/amd64 .

      # Step 5: Create release directory and save Docker image as .tar
      - name: Save Docker image as .tar and copy cumulocity.json
        run: |
          mkdir ./release
          docker save gainsight-sync-ms > ./release/image.tar
          cp cumulocity.json ./release/cumulocity.json

      # Step 6: Upload Docker image and cumulocity.json as a single artifact
      - name: Upload Docker image and cumulocity.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gainsight-sync-ms
          path: ./release/*

      # Step 7: Clean up .tmp directory
      - name: Clean up temporary files
        run: |
          rm -rf .tmp
          rm -rf ./release
