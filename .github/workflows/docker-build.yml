name: Reusable build microservices

on:
  workflow_call:
    inputs:
      version:
        description: "Version of gainsight-sync-ms to be built."
        required: false
        type: string
  push:
    branches:
      - release

env:
  NODE_VERSION: ${{ '24' }}
  BUILD_VERSION: ${{ inputs.version || (startsWith(github.ref, 'refs/heads/release') && 'release') || github.sha }}

jobs:
  build-microservices:
    name: Build microservices
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Set version
        run: |
          jq --arg version "${{ env.BUILD_VERSION }}" '.version = $version' package.json > .tmp.json && mv .tmp.json package.json

      - name: Align version in cumulocity.json
        run: |
          cat cumulocity.json | jq --arg version "${{ env.BUILD_VERSION }}" '.version = $version' > .tmp.json && mv .tmp.json cumulocity.json

      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker buildx build --progress=plain --provenance=false \
            --platform linux/amd64,linux/arm64 \
            --tag gainsight-sync-ms:${{ env.BUILD_VERSION }} \
            --tag gainsight-sync-ms:latest \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --load \
            --target=production \
            -f ./Dockerfile .

      - name: Package image artifact
        run: |
          mkdir -p .tmp
          docker save gainsight-sync-ms:${{ env.BUILD_VERSION }} > .tmp/image.tar
          cp cumulocity.json .tmp/cumulocity.json
          zip -j .tmp/gainsight-sync-ms-${{ env.BUILD_VERSION }}.zip .tmp/image.tar .tmp/cumulocity.json

      - name: Upload microservice artifact
        uses: actions/upload-artifact@v6
        with:
          name: gainsight-sync-ms-${{ env.BUILD_VERSION }}
          if-no-files-found: error
          retention-days: 5
          path: .tmp/gainsight-sync-ms-${{ env.BUILD_VERSION }}.zip

